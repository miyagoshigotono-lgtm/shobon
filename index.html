<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ねこのアクション</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ねこのアクション">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#fff; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; user-select:none; }
#gameContainer { position:relative; width:100vw; height:100vh; overflow:hidden; }
canvas { display:block; }

#hud {
  position:fixed; top:12px; left:0; right:0;
  display:flex; justify-content:center; pointer-events:none; z-index:10;
}
#deathCount {
  font-family:'Courier New',monospace; font-size:13px; color:#333;
  letter-spacing:2px; background:rgba(255,255,255,0.9);
  padding:4px 14px; border:1px solid #bbb;
}

#deathMessage {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:'Courier New',monospace; font-size:clamp(18px,5vw,28px);
  color:#111; letter-spacing:3px; text-align:center;
  pointer-events:none; z-index:20; opacity:0; transition:opacity 0.15s;
  white-space:nowrap;
}
#deathMessage.show { opacity:1; }

#titleScreen {
  position:fixed; inset:0; background:#fff;
  display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:30;
}
#titleScreen h1 { font-family:'Courier New',monospace; font-size:clamp(20px,6vw,36px); letter-spacing:4px; color:#111; margin-bottom:8px; }
#titleScreen p  { font-family:'Courier New',monospace; font-size:clamp(10px,3vw,14px); color:#888; letter-spacing:2px; margin-bottom:40px; }
#titleCat { margin-bottom:32px; }

#startBtn {
  font-family:'Courier New',monospace; font-size:clamp(13px,4vw,18px);
  letter-spacing:4px; color:#111; background:none; border:2px solid #111;
  padding:12px 32px; cursor:pointer; transition:background .15s,color .15s;
}
#startBtn:active,#startBtn:hover { background:#111; color:#fff; }

#clearScreen {
  position:fixed; inset:0; background:#fff;
  display:none; flex-direction:column; align-items:center; justify-content:center; z-index:30;
}
#clearScreen h2 { font-family:'Courier New',monospace; font-size:clamp(22px,6vw,40px); letter-spacing:4px; color:#111; margin-bottom:16px; }
#clearScreen p  { font-family:'Courier New',monospace; font-size:clamp(11px,3vw,15px); color:#555; letter-spacing:2px; margin-bottom:40px; }
#retryBtn {
  font-family:'Courier New',monospace; font-size:clamp(13px,4vw,18px);
  letter-spacing:4px; color:#111; background:none; border:2px solid #111;
  padding:12px 32px; cursor:pointer; transition:background .15s,color .15s;
}
#retryBtn:active,#retryBtn:hover { background:#111; color:#fff; }

#controller {
  position:fixed; bottom:0; left:0; right:0; height:140px;
  display:flex; justify-content:space-between; align-items:flex-end;
  padding:0 20px 24px; z-index:10; pointer-events:none;
}
.ctrl-group { display:flex; gap:8px; pointer-events:all; }
.ctrl-btn {
  width:64px; height:64px; background:rgba(0,0,0,0.08);
  border:2px solid rgba(0,0,0,0.2); border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; cursor:pointer; touch-action:none;
  -webkit-tap-highlight-color:transparent; transition:background .08s;
}
.ctrl-btn.pressed, .ctrl-btn:active { background:rgba(0,0,0,0.22); }
#jumpBtn { width:72px; height:72px; }
</style>
</head>
<body>
<div id="gameContainer"><canvas id="gameCanvas"></canvas></div>

<div id="hud"><div id="deathCount">死亡 : 0</div></div>
<div id="deathMessage">ハッ‥ハッ‥ハ・・・。</div>

<div id="titleScreen">
  <div id="titleCat"><canvas id="titleCatCanvas" width="64" height="64"></canvas></div>
  <h1>ねこのアクション</h1>
  <p>STAGE  1</p>
  <button id="startBtn" onclick="startGame()">はじめる</button>
</div>

<div id="clearScreen">
  <h2>クリア！</h2>
  <p id="clearMsg">死亡回数 : 0</p>
  <button id="retryBtn" onclick="restartGame()">もういちど</button>
</div>

<div id="controller">
  <div class="ctrl-group">
    <div class="ctrl-btn" id="leftBtn">◀</div>
    <div class="ctrl-btn" id="rightBtn">▶</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-btn" id="jumpBtn">▲</div>
  </div>
</div>

<script>
// ============================================================
// 基本設定
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const TILE=32, GRAVITY=0.55, JUMP_FORCE=-12.5, MOVE_SPEED=3.2;
const CAT_W=26, CAT_H=28;

let state='title';
let deathCount=0;
let camera={x:0};
let IS_DEAD=false;

// ============================================================
// 入力
// ============================================================
const keys={left:false,right:false};
let jumpPressed=false, jumpUsed=false;

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d') keys.right=true;
  if((e.key==='ArrowUp'||e.key===' '||e.key==='z')&&!jumpUsed){ jumpPressed=true; jumpUsed=true; }
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d') keys.right=false;
  if(e.key==='ArrowUp'||e.key===' '||e.key==='z') jumpUsed=false;
});

function setupTouch(id,key){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;el.classList.remove('pressed');},{passive:false});
  el.addEventListener('touchcancel',()=>{keys[key]=false;el.classList.remove('pressed');});
}
setupTouch('leftBtn','left');
setupTouch('rightBtn','right');

const jumpBtn=document.getElementById('jumpBtn');
jumpBtn.addEventListener('touchstart',e=>{
  e.preventDefault(); jumpBtn.classList.add('pressed');
  if(!jumpUsed){jumpPressed=true;jumpUsed=true;}
},{passive:false});
jumpBtn.addEventListener('touchend',e=>{
  e.preventDefault(); jumpBtn.classList.remove('pressed'); jumpUsed=false;
},{passive:false});

// ============================================================
// プレイヤー
// ============================================================
const SPAWN={x:60,y:380};
let player={};

function resetPlayer(){
  player={x:SPAWN.x,y:SPAWN.y,vx:0,vy:0,onGround:false,facingRight:true,alive:true,frame:0,frameTimer:0};
}

// ============================================================
// ステージオブジェクト
// ============================================================
let platforms=[], hazards=[], goalObj=null, movingObjects=[], projectiles=[];
let worldWidth=0;

let trap={
  pitSpike:false,
  crushBlock:false,
  spikeIslandMoved:false,
  fakeGoalFired:false,
  ceilingSpikeDropped:false,
  floorRiseActive:false,
  islandAUp1:false,   // 島B着地で1ノ島が上昇
  islandAUp2:false,   // 島C着地でさらに上昇
  islandAUp3:false,   // 島D着地でさらに上昇
  islandAFly:false,   // 島Dから足が離れたとき1ノ島が飛んでくる
};

// ============================================================
// ステージ1構築
// ============================================================
function buildStage1(){
  platforms=[]; hazards=[]; movingObjects=[]; projectiles=[];
  trap={pitSpike:false,crushBlock:false,spikeIslandMoved:false,
        fakeGoalFired:false,ceilingSpikeDropped:false,floorRiseActive:false,
        islandAUp1:false,islandAUp2:false,islandAUp3:false,islandAFly:false};

  const S=TILE;
  const GY=480; // 地面Y座標

  // =============================================
  // 島①: スタート地帯 (x=0〜9マス)
  // =============================================
  for(let i=0;i<10;i++) addSolid(i*S, GY);

  // =============================================
  // 穴: 10〜11マス (2マス幅)
  // =============================================
  // 右マス(11)を通ると下からトゲ発動 → trap①

  // =============================================
  // 島②: 落ちるブロック地帯 (x=12〜17マス)
  // =============================================
  for(let i=12;i<18;i++) addSolid(i*S, GY);

  // 落ちるブロック：島②の上に浮く (高さ2マス上)
  // プレイヤーが下をくぐろうとすると落下→潰死
  addCrushBlock(13*S, GY-2*S, 4*S, S); // 幅4マスの天井ブロック

  // =============================================
  // 穴: 18〜19マス
  // =============================================

  // =============================================
  // 島③: トゲ島がある地帯 (x=20〜27マス)
  // =============================================
  for(let i=20;i<28;i++) addSolid(i*S, GY);

  // トゲ島(③の上、2マス高さに浮く足場＋トゲ)
  // 初期位置: x=26〜27 (旧24から+2マス右)
  // プレイヤーが周囲2マス以内に近づいたとき左2マスへ移動
  addMovingPlatform(22*S, GY-3*S, 2*S, S, 'spikeIsland');
  addMovingSpike(22*S, GY-3*S-S+8, 2*S, 14, 'spikeIslandHazard');

  // =============================================
  // 穴: 28〜29マス
  // =============================================

  // =============================================
  // 島④: 見せかけの広い安全地帯 (x=30〜40マス)
  // =============================================
  for(let i=30;i<41;i++) addSolid(i*S, GY);

  // 【仕掛け④】天井から落ちるトゲ2本
  // 左トゲ: x=30〜31, 右トゲ: x=34〜35 → x=32〜33が安全2マス
  addCeilingSpike(30*S, -S, 2*S, S, 'ceilA');
  addCeilingSpike(34*S, -S, 2*S, S, 'ceilB');

  // 【仕掛け⑤】床から上昇するトゲ
  // x=38〜39 に地面下に隠れているトゲ。x=37踏んだら上昇
  addFloorSpike(38*S, GY+S, 2*S, S);

  // =============================================
  // 穴: 41〜42マス
  // =============================================

  // =============================================
  // 島⑤: ⑥ギミック用 4つの動く島 (x=43〜54)
  // =============================================
  // 手前の踏み台（固定）
  addSolid(43*S, GY);
  addSolid(44*S, GY);

  // 島A (1ノ島): 何も起きない
  addDynamicIsland(46*S, GY-2*S, 2*S, S, 'islandA');
  // 島B (2ノ島): 着地→右1マス移動、1秒後落下
  addDynamicIsland(49*S, GY-3*S, 2*S, S, 'islandB');
  // 島C (3ノ島): 着地→下2マス・左1マス移動
  addDynamicIsland(52*S, GY-4*S, 2*S, S, 'islandC');
  // 島D (4ノ島): 着地→1ノ島がさらに上へ、足が離れた瞬間1ノ島が右へ飛んでくる
  addDynamicIsland(55*S, GY-3*S, 2*S, S, 'islandD');

  // =============================================
  // 島⑥: ゴール前の広場 (x=58〜68マス)
  // =============================================
  for(let i=58;i<69;i++) addSolid(i*S, GY);

  // 【仕掛け⑦】偽ゴール
  addFakeGoal(62*S, GY-4*S);

  // 【仕掛け⑧】ゴール直前の見えない落とし穴
  addFakeFloor(66*S, GY, 2*S, S);

  // 本物のゴール
  goalObj={x:68*S, y:GY-4*S, w:S, h:4*S};

  worldWidth=70*S;
}

// ---- オブジェクト追加ヘルパー ----
function addSolid(x,y){ platforms.push({x,y,w:TILE,h:TILE,type:'solid',visible:true}); }

function addFakeBlock(x,y){
  platforms.push({x,y,w:TILE,h:TILE,type:'fake',visible:true,alpha:1,fading:false,fakeTimer:0});
}

function addCrushBlock(x,y,w,h){
  // 天井として機能。プレイヤーが下から侵入しようとすると落下
  platforms.push({x,y,w,h,type:'crush',visible:true,falling:false,vy:0,triggered:false});
}

function addMovingPlatform(x,y,w,h,id){
  platforms.push({x,y,w,h,type:'moving',id,visible:true,moved:false});
}

function addMovingSpike(x,y,w,h,id){
  hazards.push({x,y,w,h,type:'moving_spike',id,visible:true});
}

function addCeilingSpike(x,y,w,h,id=''){
  movingObjects.push({x,y,w,h,type:'ceiling_spike',id,visible:false,vy:0,active:false,done:false});
}

function addFloorSpike(x,y,w,h){
  // 床下から上昇するトゲ
  movingObjects.push({x,y,w,h,type:'floor_spike',visible:false,vy:0,active:false,targetY:0,done:false});
}

function addFakeGoal(x,y){
  // 偽ゴールポール
  movingObjects.push({x,y,type:'fake_goal',triggered:false});
}

function addDynamicIsland(x,y,w,h,id){
  platforms.push({
    x,y,w,h,type:'dynamic',id,visible:true,
    initX:x, initY:y,
    landed:false,
    leftGround:false,
    fallTimer:0,
    falling:false,
    vy:0,
    flying:false,
    flyVx:0,
  });
}

function addFakeFloor(x,y,w,h){
  platforms.push({x,y,w,h,type:'fake_floor',visible:true});
}

// ============================================================
// 更新
// ============================================================
function updateTraps(){
  const S=TILE;
  const GY=480;
  const px=player.x, py=player.y;

  // ① 穴トゲ: プレイヤーが溝の右マス(x=11*S〜12*S)の上空を通過
  if(!trap.pitSpike && px+CAT_W > 11*S && px < 12*S && py < GY){
    trap.pitSpike=true;
    firePitSpike(11*S+S/2, GY+S);
  }

  // ② 押しつぶしブロック: プレイヤーが島②の下通路に入った瞬間
  if(!trap.crushBlock){
    for(const b of platforms){
      if(b.type==='crush' && !b.triggered){
        // プレイヤーがブロック直下を通過(ブロック下端より下、水平に重なる)
        if(px+CAT_W > b.x && px < b.x+b.w && py > b.y+b.h && py < b.y+b.h+2*S){
          b.triggered=true;
          b.falling=true;
          trap.crushBlock=true;
        }
      }
    }
  }

  // ③ トゲ島移動: プレイヤーがトゲ島の周囲2マス以内に近づいたとき
  if(!trap.spikeIslandMoved){
    for(const b of platforms){
      if(b.type==='moving' && b.id==='spikeIsland'){
        const dist=Math.abs((player.x+CAT_W/2)-(b.x+b.w/2));
        if(dist < 2*TILE){
          trap.spikeIslandMoved=true;
          b.x -= 2*TILE;
          for(const h of hazards){
            if(h.type==='moving_spike' && h.id==='spikeIslandHazard') h.x -= 2*TILE;
          }
        }
      }
    }
  }

  // ④ 天井トゲ落下: プレイヤーがx=32*S踏んだとき → 2本同時発動
  if(!trap.ceilingSpikeDropped && player.onGround && px > 32*S && px < 33*S){
    trap.ceilingSpikeDropped=true;
    for(const m of movingObjects){
      if(m.type==='ceiling_spike'){ m.active=true; m.visible=true; m.y=-S; m.vy=9; }
    }
  }

  // ⑤ 床トゲ上昇: プレイヤーがx=37*S踏んだとき
  if(!trap.floorRiseActive && player.onGround && px > 37*S && px < 38*S){
    trap.floorRiseActive=true;
    for(const m of movingObjects){
      if(m.type==='floor_spike'){ m.active=true; m.visible=true; m.targetY=GY-S+8; }
    }
  }

  // ⑥ 4島ギミック
  updateIslandGimmick();

  // ⑦ 偽ゴール: プレイヤーが触れたとき
  for(const m of movingObjects){
    if(m.type==='fake_goal' && !m.triggered){
      if(Math.abs(px - m.x) < S*1.5 && py < GY && py > GY-5*S){
        m.triggered=true;
        trap.fakeGoalFired=true;
        // 上からトゲ雨を数本飛ばす
        for(let i=0;i<6;i++){
          projectiles.push({x:m.x + (i-2)*S*0.8, y:-S, w:10, h:20, vy:10+i*1.5, type:'spike_rain'});
        }
      }
    }
  }
}

// ⑥ 4島ギミック本体
function updateIslandGimmick(){
  const S=TILE;
  const isA=platforms.find(b=>b.id==='islandA');
  const isB=platforms.find(b=>b.id==='islandB');
  const isC=platforms.find(b=>b.id==='islandC');
  const isD=platforms.find(b=>b.id==='islandD');
  if(!isA||!isB||!isC||!isD) return;

  const px=player.x, py=player.y;
  const onIsland=(isl)=>player.onGround && rectOverlap(px,py+CAT_H-2,CAT_W,4,isl.x,isl.y,isl.w,S/2);

  // 島B着地 → 右1マス移動 + islandA上2マス + タイマー開始
  if(!trap.islandAUp1 && onIsland(isB)){
    trap.islandAUp1=true;
    isB.x += S;          // 右1マス
    isA.y -= 2*S;        // A上昇
    isB.fallTimer=60;    // 約1秒後落下
  }

  // 島C着地 → 下2マス・左1マス + islandAさらに上2マス
  if(!trap.islandAUp2 && onIsland(isC)){
    trap.islandAUp2=true;
    isC.x -= S;          // 左1マス
    isC.y += 2*S;        // 下2マス
    isA.y -= 2*S;        // A上昇
  }

  // 島D着地 → islandAさらに上2マス
  if(!trap.islandAUp3 && onIsland(isD)){
    trap.islandAUp3=true;
    isA.y -= 2*S;
    isD.landed=true;
  }

  // 島Dから足が離れた瞬間 → islandAが右方向へ飛んでくる
  if(trap.islandAUp3 && !trap.islandAFly && isD.landed){
    const stillOn=onIsland(isD);
    if(!stillOn){
      trap.islandAFly=true;
      isA.flying=true;
      isA.flyVx=14; // 右へ高速
    }
  }

  // 島B落下タイマー
  if(isB.fallTimer>0){
    isB.fallTimer--;
    if(isB.fallTimer===0) isB.falling=true;
  }
}

function updateMovingObjects(){
  const GY=480;
  for(const m of movingObjects){
    if(!m.active && m.type!=='fake_goal') continue;

    if(m.type==='ceiling_spike'){
      m.y += m.vy;
      if(m.y > canvas.height+100) m.done=true;
      // 当たり判定
      if(!m.done && player.alive && rectOverlap(player.x,player.y,CAT_W,CAT_H,m.x,m.y,m.w,m.h)){
        killPlayer();
      }
    }

    if(m.type==='floor_spike'){
      if(m.y > m.targetY) m.y -= 5;
      if(m.y <= m.targetY) m.y=m.targetY;
      // 当たり判定
      if(player.alive && rectOverlap(player.x,player.y,CAT_W,CAT_H,m.x,m.y,m.w,m.h)){
        killPlayer();
      }
    }
  }

  // トゲ雨
  for(const p of projectiles){
    p.y += p.vy;
    if(player.alive && rectOverlap(player.x,player.y,CAT_W,CAT_H,p.x,p.y,p.w,p.h)){
      killPlayer();
    }
  }
  // 落下済み削除
  projectiles=projectiles.filter(p=>p.y<canvas.height+100);

  // 押しつぶしブロック落下
  for(const b of platforms){
    if(b.type==='crush' && b.falling){
      b.vy=(b.vy||0)+0.8;
      b.y+=b.vy;
      // 地面に当たったら止まる
      if(b.y>=480){ b.y=480; b.falling=false; }
      // プレイヤーとの判定
      if(player.alive && rectOverlap(player.x,player.y,CAT_W,CAT_H,b.x,b.y,b.w,b.h)){
        killPlayer();
      }
    }
  }

  // dynamic島の物理
  for(const b of platforms){
    if(b.type!=='dynamic') continue;
    // 落下
    if(b.falling){
      b.vy=(b.vy||0)+0.7;
      b.y+=b.vy;
      if(b.y>canvas.height+200) b.visible=false;
      if(player.alive && rectOverlap(player.x,player.y,CAT_W,CAT_H,b.x,b.y,b.w,b.h)) killPlayer();
    }
    // 飛んでくる (islandA)
    if(b.flying){
      b.x+=b.flyVx;
      if(player.alive && rectOverlap(player.x,player.y,CAT_W,CAT_H,b.x,b.y,b.w,b.h)) killPlayer();
      if(b.x>worldWidth+200) b.visible=false;
    }
  }

  // 偽ブロック消去
  for(const b of platforms){
    if(b.type==='fake' && b.fading){
      b.fakeTimer--;
      b.alpha=b.fakeTimer/20;
      if(b.fakeTimer<=0) b.visible=false;
    }
  }
}

// 穴トゲ発射
let pitSpikes=[];
function firePitSpike(cx, startY){
  // 3本並べる
  for(let i=-1;i<=1;i++){
    pitSpikes.push({x:cx+i*14-5, y:startY, w:10, h:20, vy:-18});
  }
}

function updatePitSpikes(){
  for(const s of pitSpikes){
    s.y+=s.vy;
    s.vy+=0.3; // 空気抵抗で減速はしない、ビューから消えるまで飛ぶ
    if(player.alive && rectOverlap(player.x,player.y,CAT_W,CAT_H,s.x,s.y,s.w,s.h)){
      killPlayer();
    }
  }
  pitSpikes=pitSpikes.filter(s=>s.y>-200);
}

// ============================================================
// 衝突
// ============================================================
function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function resolvePlatforms(){
  player.onGround=false;
  for(const b of platforms){
    if(!b.visible) continue;
    if(b.type==='fake_floor') continue;
    if(b.type==='crush' && b.falling && b.vy>2) continue;
    if(b.type==='fake' && b.alpha<=0) continue;
    if(b.type==='dynamic' && (!b.visible || b.falling || b.flying)) continue;

    if(!rectOverlap(player.x,player.y,CAT_W,CAT_H,b.x,b.y,b.w,b.h)) continue;

    const overlapX=Math.min(player.x+CAT_W,b.x+b.w)-Math.max(player.x,b.x);
    const overlapY=Math.min(player.y+CAT_H,b.y+b.h)-Math.max(player.y,b.y);

    if(overlapX>=overlapY){
      if(player.y+CAT_H-player.vy<=b.y+2){
        player.y=b.y-CAT_H;
        player.vy=0;
        player.onGround=true;
        if(b.type==='fake'&&!b.fading){b.fading=true;b.fakeTimer=20;}
      } else {
        player.y=b.y+b.h;
        player.vy=2;
      }
    } else {
      if(player.x+CAT_W/2<b.x+b.w/2){ player.x=b.x-CAT_W; }
      else { player.x=b.x+b.w; }
      player.vx=0;
    }
  }
}

// ============================================================
// 死亡・リスポーン
// ============================================================
const deathMsg=document.getElementById('deathMessage');
const deathCountEl=document.getElementById('deathCount');

function killPlayer(){
  if(!player.alive||IS_DEAD) return;
  player.alive=false;
  player.vx=0; player.vy=-8;
  deathCount++;
  deathCountEl.textContent='死亡 : '+deathCount;
  IS_DEAD=true;
  deathMsg.classList.add('show');
  setTimeout(()=>{ deathMsg.classList.remove('show'); setTimeout(()=>respawn(),300); },1600);
}

function respawn(){
  IS_DEAD=false;
  pitSpikes=[];
  buildStage1();
  resetPlayer();
  camera.x=0;
}

function triggerClear(){
  state='clear';
  const cs=document.getElementById('clearScreen');
  cs.style.display='flex';
  document.getElementById('clearMsg').textContent='死亡回数 : '+deathCount;
}

function restartGame(){
  deathCount=0;
  deathCountEl.textContent='死亡 : 0';
  document.getElementById('clearScreen').style.display='none';
  pitSpikes=[];
  buildStage1();
  resetPlayer();
  camera.x=0;
  state='playing';
}

function startGame(){
  document.getElementById('titleScreen').style.display='none';
  pitSpikes=[];
  buildStage1();
  resetPlayer();
  camera.x=0;
  state='playing';
}

// ============================================================
// 描画
// ============================================================
function drawCat(p){
  const x=Math.floor(p.x-camera.x), y=Math.floor(p.y);
  ctx.save();
  if(!p.facingRight){
    ctx.translate(x+CAT_W/2,y+CAT_H/2);
    ctx.scale(-1,1);
    ctx.translate(-(x+CAT_W/2),-(y+CAT_H/2));
  }
  ctx.imageSmoothingEnabled=false;
  ctx.fillStyle='#111';
  ctx.fillRect(x+3,y+10,20,16);
  ctx.fillRect(x+5,y+2,16,14);
  ctx.fillRect(x+5,y,5,5);
  ctx.fillRect(x+16,y,5,5);
  ctx.fillStyle='#fff';
  ctx.fillRect(x+8,y+6,4,4);
  ctx.fillRect(x+15,y+6,4,4);
  ctx.fillStyle='#111';
  if(p.alive){
    ctx.fillRect(x+9,y+7,2,3);
    ctx.fillRect(x+16,y+7,2,3);
  } else {
    ctx.fillStyle='#666';
    ctx.fillRect(x+8,y+6,2,2); ctx.fillRect(x+11,y+9,2,2);
    ctx.fillRect(x+9,y+7,2,2); ctx.fillRect(x+10,y+8,2,2);
    ctx.fillRect(x+15,y+6,2,2); ctx.fillRect(x+18,y+9,2,2);
    ctx.fillRect(x+16,y+7,2,2); ctx.fillRect(x+17,y+8,2,2);
  }
  ctx.fillStyle='#ff9999';
  ctx.fillRect(x+12,y+11,3,2);
  ctx.fillStyle='#111';
  const f=p.frame%2;
  ctx.fillRect(x+4,y+24+(f?-2:0),7,6+(f?2:0));
  ctx.fillRect(x+15,y+24+(f?0:-2),7,6+(f?0:2));
  ctx.fillRect(x+22,y+18,4,3);
  ctx.fillRect(x+25,y+15,3,4);
  ctx.fillRect(x+27,y+12,3,4);
  ctx.restore();
}

function drawBlock(b){
  if(!b.visible) return;
  const px=Math.floor(b.x-camera.x), py=Math.floor(b.y);
  if(px>canvas.width+b.w||px<-b.w) return;
  ctx.save();
  if(b.type==='fake') ctx.globalAlpha=b.alpha;

  if(b.type==='fake_floor'){
    // 薄く描く（見た目はある）
    ctx.globalAlpha=1;
    ctx.fillStyle='#222';
    ctx.fillRect(px,py,b.w,b.h);
    ctx.fillStyle='#444';
    for(let i=2;i<b.w-2;i+=6) for(let j=2;j<b.h-2;j+=6) ctx.fillRect(px+i,py+j,2,2);
    ctx.restore();
    return;
  }

  ctx.fillStyle='#222';
  ctx.fillRect(px,py,b.w,b.h);
  ctx.fillStyle='#444';
  for(let i=2;i<b.w-2;i+=6) for(let j=2;j<b.h-2;j+=6) ctx.fillRect(px+i,py+j,2,2);

  if(b.type==='dynamic'){
    ctx.fillStyle='#222';
    ctx.fillRect(px,py,b.w,b.h);
    ctx.fillStyle='#444';
    for(let i=2;i<b.w-2;i+=6) for(let j=2;j<b.h-2;j+=6) ctx.fillRect(px+i,py+j,2,2);
    ctx.strokeStyle='#c07000'; ctx.lineWidth=2;
    ctx.strokeRect(px+1,py+1,b.w-2,b.h-2);
    ctx.restore();
    return;
  }

  if(b.type==='fake'){
    ctx.strokeStyle='#c03030'; ctx.lineWidth=2;
    ctx.strokeRect(px+1,py+1,b.w-2,b.h-2);
  }
  if(b.type==='crush'){
    ctx.strokeStyle='#505'; ctx.lineWidth=3;
    ctx.strokeRect(px+1,py+1,b.w-2,b.h-2);
  }
  ctx.restore();
}

function drawMovingObjects(){
  for(const m of movingObjects){
    if(m.type==='ceiling_spike'&&m.visible){
      drawSpikeShape(m.x-camera.x, m.y, m.w, m.h, true);
    }
    if(m.type==='floor_spike'&&m.visible){
      drawSpikeShape(m.x-camera.x, m.y, m.w, m.h, false);
    }
    if(m.type==='fake_goal'){
      drawGoalPole(m.x-camera.x, m.y, true);
    }
  }
  // トゲ雨
  for(const p of projectiles){
    const px=Math.floor(p.x-camera.x);
    ctx.fillStyle='#333';
    ctx.beginPath();
    ctx.moveTo(px+p.w/2,p.y+p.h);
    ctx.lineTo(px,p.y);
    ctx.lineTo(px+p.w,p.y);
    ctx.closePath();
    ctx.fill();
  }
  // 穴トゲ
  for(const s of pitSpikes){
    const px=Math.floor(s.x-camera.x);
    ctx.fillStyle='#333';
    ctx.beginPath();
    ctx.moveTo(px+s.w/2,s.y);
    ctx.lineTo(px,s.y+s.h);
    ctx.lineTo(px+s.w,s.y+s.h);
    ctx.closePath();
    ctx.fill();
  }
}

function drawSpikeShape(px,py,w,h,pointUp){
  ctx.fillStyle='#333';
  const count=Math.floor(w/12);
  for(let i=0;i<count;i++){
    ctx.beginPath();
    if(pointUp){
      ctx.moveTo(px+i*12,py+h);
      ctx.lineTo(px+i*12+6,py);
      ctx.lineTo(px+i*12+12,py+h);
    } else {
      ctx.moveTo(px+i*12,py);
      ctx.lineTo(px+i*12+6,py+h);
      ctx.lineTo(px+i*12+12,py);
    }
    ctx.closePath();
    ctx.fill();
  }
}

function drawGoalPole(px,py,isFake){
  ctx.fillStyle=isFake?'#888':'#555';
  ctx.fillRect(px+TILE/2-3,py,6,TILE*4);
  ctx.fillStyle=isFake?'#aaa':'#111';
  ctx.beginPath();
  ctx.moveTo(px+TILE/2+3,py+4);
  ctx.lineTo(px+TILE/2+22,py+14);
  ctx.lineTo(px+TILE/2+3,py+24);
  ctx.closePath();
  ctx.fill();
}

function drawGoal(){
  if(!goalObj) return;
  const px=Math.floor(goalObj.x-camera.x), py=Math.floor(goalObj.y);
  ctx.fillStyle='#555';
  ctx.fillRect(px+TILE/2-3,py,6,goalObj.h);
  ctx.fillStyle='#111';
  ctx.beginPath();
  ctx.moveTo(px+TILE/2+3,py+4);
  ctx.lineTo(px+TILE/2+22,py+14);
  ctx.lineTo(px+TILE/2+3,py+24);
  ctx.closePath();
  ctx.fill();
}

function drawMovingHazards(){
  for(const h of hazards){
    if(!h.visible) continue;
    const px=Math.floor(h.x-camera.x), py=Math.floor(h.y);
    if(h.type==='moving_spike'){
      drawSpikeShape(px,py,h.w,h.h,true);
    }
  }
}

function drawBackground(){
  ctx.strokeStyle='rgba(0,0,0,0.04)';
  ctx.lineWidth=1;
  const G=32;
  const sx=Math.floor(camera.x/G)*G;
  for(let gx=sx;gx<camera.x+canvas.width+G;gx+=G){
    ctx.beginPath(); ctx.moveTo(gx-camera.x,0); ctx.lineTo(gx-camera.x,canvas.height); ctx.stroke();
  }
  for(let gy=0;gy<canvas.height;gy+=G){
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(canvas.width,gy); ctx.stroke();
  }
}

// タイトル猫
function drawTitleCat(){
  const tc=document.getElementById('titleCatCanvas');
  const tctx=tc.getContext('2d');
  tctx.clearRect(0,0,64,64);
  const p=tctx, x=19, y=8;
  p.fillStyle='#111';
  p.fillRect(x+3,y+10,20,16); p.fillRect(x+5,y+2,16,14);
  p.fillRect(x+5,y,5,5); p.fillRect(x+16,y,5,5);
  p.fillStyle='#fff'; p.fillRect(x+8,y+6,4,4); p.fillRect(x+15,y+6,4,4);
  p.fillStyle='#111'; p.fillRect(x+9,y+7,2,3); p.fillRect(x+16,y+7,2,3);
  p.fillStyle='#ff9999'; p.fillRect(x+12,y+11,3,2);
  p.fillStyle='#111';
  p.fillRect(x+4,y+24,7,6); p.fillRect(x+15,y+24,7,6);
  p.fillRect(x+22,y+18,4,3); p.fillRect(x+25,y+15,3,4);
}

// ============================================================
// メインループ
// ============================================================
let lastTime=0;
function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  const dt=Math.min(ts-lastTime,32); lastTime=ts;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(state!=='playing') return;

  // プレイヤー更新
  if(player.alive && !IS_DEAD){
    if(keys.left){player.vx=-MOVE_SPEED;player.facingRight=false;}
    else if(keys.right){player.vx=MOVE_SPEED;player.facingRight=true;}
    else player.vx*=0.7;

    if(jumpPressed && player.onGround){
      player.vy=JUMP_FORCE;
      player.onGround=false;
    }
    jumpPressed=false;

    player.vy+=GRAVITY;
    player.x+=player.vx;
    player.y+=player.vy;

    resolvePlatforms();

    // 落下死
    if(player.y>canvas.height+60) killPlayer();
    // 左端制限
    if(player.x<camera.x+5) player.x=camera.x+5;
    // 右端制限
    if(player.x+CAT_W>worldWidth) player.x=worldWidth-CAT_W;

    // 動くハザード判定
    for(const h of hazards){
      if(!h.visible) continue;
      if(rectOverlap(player.x+3,player.y+3,CAT_W-6,CAT_H-6,h.x,h.y,h.w,h.h)) killPlayer();
    }

    // ゴール
    if(goalObj && rectOverlap(player.x,player.y,CAT_W,CAT_H,goalObj.x,goalObj.y,goalObj.w,goalObj.h)){
      triggerClear();
    }

    // トラップ判定
    updateTraps();

    // アニメ
    player.frameTimer++;
    if(player.frameTimer>8){player.frame=(player.frame+1)%2;player.frameTimer=0;}
  } else if(IS_DEAD && player.alive===false){
    // 死亡モーション
    player.vy+=GRAVITY;
    player.y+=player.vy;
    jumpPressed=false;
  }

  updateMovingObjects();
  updatePitSpikes();

  // カメラ
  const targetX=player.x-canvas.width*0.35;
  camera.x+=(targetX-camera.x)*0.12;
  camera.x=Math.max(0,Math.min(camera.x,worldWidth-canvas.width));

  // 描画
  drawBackground();
  for(const b of platforms) drawBlock(b);
  drawMovingHazards();
  drawMovingObjects();
  drawGoal();
  drawCat(player);
}

// 起動
drawTitleCat();
requestAnimationFrame(gameLoop);

  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(()=>console.log('SW登録完了'))
      .catch(e=>console.log('SW登録失敗:', e));
  });
}
